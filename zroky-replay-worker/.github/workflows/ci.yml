name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install
        run: python -m pip install -e . pytest httpx pytest-asyncio
      - name: Test
        run: python -m pytest -q
      - name: Compile public modules
        run: python -m py_compile app/main.py app/poller.py app/runner.py app/artifacts.py app/config.py app/models.py
