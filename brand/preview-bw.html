<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Zroky B&W Logo</title>
  <style>
    body { margin:0; font-family:'Segoe UI',system-ui,sans-serif; background:#fff; color:#0A0A0A; }
    header { padding:24px 40px; border-bottom:1px solid #eee; }
    h1 { margin:0; font-size:16px; letter-spacing:3px; }
    section { padding:32px 40px; border-bottom:1px solid #f2f2f2; }
    .label { font-size:11px; letter-spacing:2px; color:#888; margin-bottom:16px; text-transform:uppercase; }
    .sizes { display:flex; align-items:center; gap:32px; }
    .sizes img.a { width:160px; }
    .sizes img.b { width:64px; }
    .sizes img.c { width:32px; }
    .sizes img.d { width:16px; }
    .lockup img { max-width:520px; width:100%; }
  </style>
</head>
<body>
  <header><h1>ZROKY — BLACK &amp; WHITE</h1></header>

  <section>
    <div class="label">Mark — scaling test</div>
    <div class="sizes">
      <img class="a" src="zroky-mark-bw.svg" alt="mark"/>
      <img class="b" src="zroky-mark-bw.svg" alt="64"/>
      <img class="c" src="zroky-mark-bw.svg" alt="32"/>
      <img class="d" src="zroky-mark-bw.svg" alt="16"/>
    </div>
  </section>

  <section class="lockup">
    <div class="label">Logo lockup (mark + wordmark)</div>
    <img src="zroky-bw-lockup.svg" alt="lockup"/>
  </section>
</body>
</html>
