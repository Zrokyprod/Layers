<svg width="480" height="160" viewBox="0 0 480 160" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Zroky">
  <defs>
    <linearGradient id="zGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6D5EF9"/>
      <stop offset="55%" stop-color="#3B82F6"/>
      <stop offset="100%" stop-color="#22D3EE"/>
    </linearGradient>
    <linearGradient id="wordGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#0F172A"/>
      <stop offset="100%" stop-color="#334155"/>
    </linearGradient>
  </defs>

  <!-- Mark: rounded square container with a stylized Z built from an AI "signal" flow -->
  <g transform="translate(16,20)">
    <rect x="0" y="0" width="120" height="120" rx="30" fill="url(#zGrad)"/>
    <!-- soft inner glow -->
    <rect x="6" y="6" width="108" height="108" rx="25" fill="none" stroke="#FFFFFF" stroke-opacity="0.18" stroke-width="2"/>

    <!-- The Z stroke -->
    <path d="M34 40 H86 L44 80 H86"
          fill="none" stroke="#FFFFFF" stroke-width="12"
          stroke-linecap="round" stroke-linejoin="round"/>

    <!-- Neural nodes: the "future / AI" concept dots on the Z path -->
    <circle cx="34" cy="40" r="7" fill="#FFFFFF"/>
    <circle cx="86" cy="40" r="7" fill="#FFFFFF"/>
    <circle cx="44" cy="80" r="7" fill="#FFFFFF"/>
    <circle cx="86" cy="80" r="7" fill="#FFFFFF"/>
  </g>

  <!-- Wordmark -->
  <g transform="translate(160,0)">
    <text x="0" y="96" font-family="'Segoe UI', 'Poppins', system-ui, sans-serif"
          font-size="64" font-weight="700" letter-spacing="-1" fill="url(#wordGrad)">Zroky</text>
    <text x="2" y="122" font-family="'Segoe UI', system-ui, sans-serif"
          font-size="16" font-weight="500" letter-spacing="6" fill="#64748B">A I &#160; P L A T F O R M</text>
  </g>
</svg>
