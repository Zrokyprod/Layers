name: API Contract Check

on:
  push:
    branches: [main]
    paths:
      - 'zroky-backend/app/**'
      - 'zroky-backend/app/api/**'
      - 'zroky-backend/app/schemas/**'
  pull_request:
    branches: [main]
    paths:
      - 'zroky-backend/app/**'
      - 'zroky-backend/app/api/**'
      - 'zroky-backend/app/schemas/**'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  api-v1-frozen-check:
    name: API v1 Breaking-Change Check (ZROKY-006)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: zroky-backend/requirements.txt

      - name: Install backend dependencies
        run: pip install -r zroky-backend/requirements.txt

      - name: Run breaking-change detector
        env:
          APP_ENV: development
          DATABASE_URL: "sqlite:///:memory:"
          REDIS_URL: "redis://localhost:6379/0"
          AUTH_JWT_SECRET: ci-test-secret-key-32-characters
          GITHUB_TOKEN_ENCRYPTION_KEY: ci-test-key-for-contract-check
          OPENAI_API_KEY: ci-test-openai-key
          OPENROUTER_API_KEY: ci-test-openrouter-key
          PII_ENCRYPTION_KEY: ci-test-pii-key
        run: python scripts/check_api_v1_frozen.py
