name: Zroky Branch Protection Drift Check

on:
  schedule:
    - cron: "17 3 * * *"
  workflow_dispatch:
    inputs:
      owner:
        description: GitHub owner or organization
        required: true
        default: Zrokyprod
      repo:
        description: Repository name
        required: true
        default: Layers
      branch:
        description: Branch to verify
        required: true
        default: main
      required_checks:
        description: Comma-separated required status check contexts
        required: true
        default: Paid Launch Readiness

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: zroky-branch-protection-audit-${{ github.ref }}
  cancel-in-progress: false

jobs:
  verify-branch-protection:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate audit token secret
        env:
          GH_TOKEN: ${{ secrets.BRANCH_PROTECTION_AUDIT_TOKEN }}
        run: |
          if [ -z "${GH_TOKEN}" ]; then
            echo "::error::Missing secret BRANCH_PROTECTION_AUDIT_TOKEN. Configure a token with repository administration read access."
            exit 1
          fi

      - name: Verify branch protection policy
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.BRANCH_PROTECTION_AUDIT_TOKEN }}
        run: |
          $owner = "${{ github.event.inputs.owner }}"
          $repo = "${{ github.event.inputs.repo }}"
          $branch = "${{ github.event.inputs.branch }}"

          if ([string]::IsNullOrWhiteSpace($owner)) { $owner = "${{ github.repository_owner }}" }
          if ([string]::IsNullOrWhiteSpace($repo)) { $repo = "${{ github.event.repository.name }}" }
          if ([string]::IsNullOrWhiteSpace($branch)) { $branch = "main" }

          $requiredChecksRaw = "${{ github.event.inputs.required_checks }}"
          if ([string]::IsNullOrWhiteSpace($requiredChecksRaw)) {
            $requiredChecksRaw = "Paid Launch Readiness"
          }
          $requiredChecks = @(
            $requiredChecksRaw -split "," |
              ForEach-Object { $_.Trim() } |
              Where-Object { -not [string]::IsNullOrWhiteSpace($_) }
          )
          $expectedChecks = $requiredChecks | Sort-Object

          $protectionJson = gh api "repos/$owner/$repo/branches/$branch/protection" --header "Accept: application/vnd.github+json" --header "X-GitHub-Api-Version: 2022-11-28"
          $protection = $protectionJson | ConvertFrom-Json

          $actualContexts = @($protection.required_status_checks.contexts)
          $actualChecksArray = @()
          if ($null -ne $protection.required_status_checks.checks) {
            $actualChecksArray = @($protection.required_status_checks.checks | ForEach-Object { $_.context })
          }
          $actualChecks = @($actualContexts + $actualChecksArray | Where-Object { $_ } | Sort-Object -Unique)
          $mismatches = @()

          if ($null -eq $protection.required_status_checks -or -not $protection.required_status_checks.strict) {
            $mismatches += "required_status_checks.strict must be true"
          }

          if (-not ($expectedChecks -join "," -ceq $actualChecks -join ",")) {
            $mismatches += "required_status_checks.contexts mismatch. expected=[$($expectedChecks -join ', ')] actual=[$($actualChecks -join ', ')]"
          }

          if (-not $protection.enforce_admins.enabled) {
            $mismatches += "enforce_admins.enabled must be true"
          }

          if (-not $protection.required_linear_history.enabled) {
            $mismatches += "required_linear_history.enabled must be true"
          }

          if (-not $protection.required_conversation_resolution.enabled) {
            $mismatches += "required_conversation_resolution.enabled must be true"
          }

          if ($protection.required_pull_request_reviews.required_approving_review_count -lt 1) {
            $mismatches += "required_pull_request_reviews.required_approving_review_count must be >= 1"
          }

          if ($protection.allow_force_pushes.enabled) {
            $mismatches += "allow_force_pushes.enabled must be false"
          }

          if ($protection.allow_deletions.enabled) {
            $mismatches += "allow_deletions.enabled must be false"
          }

          if ($mismatches.Count -gt 0) {
            Write-Host "Branch protection drift detected for $owner/$repo branch '$branch'."
            foreach ($m in $mismatches) {
              Write-Host "- $m"
            }
            exit 1
          }

          Write-Host "Branch protection verification passed for $owner/$repo branch '$branch'."
          Write-Host "Required checks: $($actualChecks -join ', ')"
