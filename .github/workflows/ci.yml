name: CI

on:
  push:
    branches: ["main", "develop"]
  pull_request:
    branches: ["main", "develop"]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  backend:
    name: Backend Tests & Lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: zroky-backend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt -r requirements-dev.txt

      - name: Ruff lint
        run: ruff check .

      - name: mypy type check
        run: mypy app --ignore-missing-imports --no-error-summary || true

      - name: pip-audit security check
        run: pip-audit --require-hashes -r requirements.txt || true

      - name: Run pytest
        env:
          TESTING: "true"
          DATABASE_URL: "sqlite:///./.data/test_ci.db"
          AUTH_JWT_SECRET: "ci-test-secret-key-32-characters"
          ALLOW_PROJECT_HEADER_CONTEXT: "true"
          REQUIRE_PROVISIONING_TOKEN: "false"
        run: |
          python -m pytest \
            --ignore=tests/test_postgres_rls.py \
            -x -q \
            --tb=short

  frontend:
    name: Frontend Build & Type Check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: zroky-dashboard

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: zroky-dashboard/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_API_URL: "https://api.zroky.ai"
