name: CI

on:
  push:
    branches: ["main", "develop"]
  pull_request:
    branches: ["main", "develop"]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  backend:
    name: Backend Tests & Lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: zroky-backend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements-dev.txt pip-audit

      - name: Ruff lint
        run: ruff check .

      - name: mypy type check
        run: mypy app --ignore-missing-imports --no-error-summary

      - name: pip-audit security check
        run: pip-audit --progress-spinner off -r requirements.txt

      - name: Create SQLite data directory
        run: mkdir -p .data

      - name: Run pytest
        env:
          TESTING: "true"
          DATABASE_URL: "sqlite:///./.data/test_ci.db"
          AUTH_JWT_SECRET: "ci-test-secret-key-32-characters"
          ALLOW_PROJECT_HEADER_CONTEXT: "true"
          REQUIRE_PROVISIONING_TOKEN: "false"
        run: |
          python -m pytest \
            --ignore=tests/test_postgres_rls.py \
            -x -q \
            --tb=short

  benchmarks:
    name: Benchmarks — SDK, Gateway, Ingest, Detectors (Rule 4)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: zroky-backend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt -r requirements-dev.txt pytest-benchmark

      - name: Run benchmarks
        env:
          TESTING: "true"
          DATABASE_URL: "sqlite:///./.data/test_bench.db"
          AUTH_JWT_SECRET: "ci-test-secret-key-32-characters"
        run: |
          mkdir -p .data
          python -m pytest benchmarks/ \
            --benchmark-json=benchmark-results.json \
            --benchmark-disable-gc \
            -q --tb=short \
            || true

      - name: Upload benchmark results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: benchmark-results
          path: zroky-backend/benchmark-results.json
          retention-days: 90

      - name: Check Rule 4 — performance limits
        run: |
          python - <<'EOF'
          import json, sys, pathlib
          results_file = pathlib.Path("benchmark-results.json")
          if not results_file.exists():
              print("No benchmark results file found — skipping regression check.")
              sys.exit(0)
          data = json.loads(results_file.read_text())
          LIMITS = {
              "trace_wrapper_overhead": 5.0,
              "gateway_proxy_passthrough": 8.0,
              "gateway_pii_redaction": 2.0,
              "gateway_fingerprint": 1.0,
              "single_event_xadd": 1.0,
              "event_serialization": 0.5,
              "token_overflow_detector": 5.0,
              "rate_limit_detector": 5.0,
              "auth_failure_detector": 5.0,
              "provider_error_detector": 5.0,
              "loop_detected_detector": 5.0,
              "cost_spike_detector": 5.0,
          }
          failed = []
          for bench in data.get("benchmarks", []):
              name = bench.get("name", "")
              mean_ms = bench["stats"]["mean"] * 1000
              for tag, limit in LIMITS.items():
                  if tag in name and mean_ms > limit:
                      failed.append(f"{name}: mean {mean_ms:.2f} ms > {limit} ms Rule 4 limit")
          if failed:
              for f in failed:
                  print(f"::error::{f}")
              sys.exit(1)
          print("OK — all benchmarks within Rule 4 limits.")
          EOF

      - name: Numeric claims lint (Rule 4)
        run: python ../scripts/check_numeric_claims.py

  schema-drift-check:
    name: Schema Drift Check (Rule 1)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run generator
        run: python scripts/gen_from_schema.py

      - name: Assert no drift
        run: |
          git diff --exit-code || {
            echo "::error::Generated artifacts are out of sync with api-contracts/ingest-event.schema.json — run 'python scripts/gen_from_schema.py' and commit the result."
            exit 1
          }
          echo "OK — all generated artifacts match the schema"

  api-v1-frozen-check:
    name: API v1 Contract Freeze (Rule 9)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: zroky-backend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt -r requirements-dev.txt

      - name: Check API v1 contract freeze
        env:
          TESTING: "true"
          DATABASE_URL: "sqlite:///./.data/test_ci.db"
          AUTH_JWT_SECRET: "ci-test-secret-key-32-characters"
          ALLOW_PROJECT_HEADER_CONTEXT: "true"
          REQUIRE_PROVISIONING_TOKEN: "false"
        run: |
          mkdir -p .data
          python ../scripts/check_api_v1_frozen.py

      - name: Check OpenAPI generated summaries are real
        run: |
          if grep -E "MagicMock|Magicmock|MagicMocks|fake-summary|fake_summary" ../api-contracts/zroky-api-v1.openapi.json; then
            echo "::error::OpenAPI contract contains MagicMock/fake-summary generated summaries or descriptions."
            exit 1
          fi

  ingest-event-v2-lint:
    name: IngestEvent v2 Lint (Rule 1)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Check for ad-hoc IngestEvent (v1) usage
        run: |
          set +e
          violations=$(grep -r --include="*.py" \
            -E "from app\.schemas\.ingest import[^(]*(IngestEvent[^V]|IngestEvent$)" \
            zroky-backend/app/)
          grep_status=$?
          set -e
          if [ "${grep_status}" -gt 1 ]; then
            echo "::error::IngestEvent v1 scan failed."
            exit "${grep_status}"
          fi
          if [ -n "$violations" ]; then
            echo "::error::IngestEvent v1 imports found — use IngestEventV2 from app.schemas.ingest_event_v2:"
            echo "$violations"
            exit 1
          fi
          echo "OK — no IngestEvent v1 usage in app/"

  replay-pass-lint:
    name: Fix-PR Replay-Pass Lint (Rule 5)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Ensure no PR is opened without a replay_status=pass check
        run: |
          set +e
          candidate_matches=$(grep -r --include="*.py" \
            -E "create_pull_request|open_pr|github_pr\.create|DiagnosisPullRequest\(" \
            zroky-backend/app/)
          grep_status=$?
          set -e
          if [ "${grep_status}" -gt 1 ]; then
            echo "::error::Replay-pass scan failed."
            exit "${grep_status}"
          fi

          violations=""
          if [ -n "$candidate_matches" ]; then
            set +e
            violations=$(printf '%s\n' "$candidate_matches" | grep -v "replay_status.*pass\|replay_pass\|# noqa: replay-lint")
            filter_status=$?
            set -e
            if [ "${filter_status}" -gt 1 ]; then
              echo "::error::Replay-pass filter failed."
              exit "${filter_status}"
            fi
          fi
          if [ -n "$violations" ]; then
            echo "::error::Possible PR-without-replay-pass: verify replay_status='pass' is checked before these calls:"
            echo "$violations"
            exit 1
          fi
          set +e
          violations_hard=$(grep -r --include="*.py" \
            -E "skip_replay_check\s*=\s*True" \
            zroky-backend/app/)
          hard_status=$?
          set -e
          if [ "${hard_status}" -gt 1 ]; then
            echo "::error::Replay bypass scan failed."
            exit "${hard_status}"
          fi
          if [ -n "$violations_hard" ]; then
            echo "::error::skip_replay_check=True found — replay verification bypass is forbidden:"
            echo "$violations_hard"
            exit 1
          fi
          echo "OK — no replay bypass flags found"

  file-size-lint:
    name: File-Size Lint (Rule 3)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run file-size lint
        run: python scripts/check_file_sizes.py

  detector-contract-check:
    name: Detector Contract Coverage (Rule 2)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Assert every detector has a contract test
        run: |
          missing=""
          for detector in token_overflow rate_limit auth_failure provider_error loop_detected cost_spike; do
            if [ ! -f "zroky-backend/tests/plugins/${detector}_contract.py" ]; then
              missing="$missing $detector"
            fi
          done
          # Also check for any new detector module without a contract test
          for f in zroky-backend/app/services/detectors/*.py; do
            base=$(basename "$f" .py)
            [[ "$base" == "__init__" || "$base" == "_payload" || "$base" == "_registry" || "$base" == "blast_radius" ]] && continue
            if [ ! -f "zroky-backend/tests/plugins/${base}_contract.py" ]; then
              missing="$missing $base"
            fi
          done
          if [ -n "$missing" ]; then
            echo "::error::Detectors missing contract tests (Rule 2):$missing"
            exit 1
          fi
          echo "OK — all detectors have contract tests"

  detector-eval:
    name: Detector Eval (Rule 6 — precision≥0.85, recall≥0.80)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: zroky-backend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt -r requirements-dev.txt

      - name: Run detector eval (all detectors)
        env:
          TESTING: "true"
          DATABASE_URL: "sqlite:///./.data/test_ci.db"
          AUTH_JWT_SECRET: "ci-test-secret-key-32-characters"
        run: |
          mkdir -p .data
          python ../scripts/run_eval.py --all --ci

  frontend:
    name: Frontend Build & Type Check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: zroky-dashboard

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: zroky-dashboard/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_API_URL: "https://api.zroky.ai"

  sdk-js:
    name: JS SDK Build + Size + Parity (Rule 4)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: zroky-sdk-js

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: zroky-sdk-js/package-lock.json

      - name: Install dependencies
        run: npm install

      - name: Build
        run: npm run build

      - name: Bundle size check (Rule 4 — < 30 KB gzipped)
        run: npm run size

      - name: Fingerprint parity test (20 samples)
        run: npm test

  gateway-go:
    name: Go Gateway Build + Vet (Rule 4)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: zroky-gateway

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go 1.22
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache: true

      - name: Download modules
        run: go mod download

      - name: go vet
        run: go vet ./...

      - name: go build
        run: go build -o /dev/null ./cmd/gateway

  docs-drift-check:
    name: Docs Drift Check (Rule 10)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run docs drift check
        run: python scripts/check_docs_drift.py
