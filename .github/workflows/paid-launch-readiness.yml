name: Final Production Release

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:
    inputs:
      production_api_url:
        description: "Optional deployed backend base URL for production smoke"
        required: false
        type: string
      production_dashboard_url:
        description: "Optional deployed dashboard base URL for production smoke"
        required: false
        type: string

concurrency:
  group: final-production-release-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  tracker:
    name: Tracker verifier
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4

      - name: Verify build tracker
        shell: pwsh
        run: ./scripts/verify_zroky_build_plan.ps1

  backend-final:
    name: Backend final gates
    runs-on: ubuntu-latest
    timeout-minutes: 35
    defaults:
      run:
        working-directory: zroky-backend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: |
            zroky-backend/requirements.txt
            zroky-backend/requirements-dev.txt

      - name: Install backend dependencies
        run: python -m pip install -r requirements.txt -r requirements-dev.txt

      - name: Run final backend gates
        env:
          TESTING: "true"
          DATABASE_URL: sqlite:///./.data/final_backend_release.db
          AUTH_JWT_SECRET: final-release-ci-secret-key-32-characters
          ALLOW_PROJECT_HEADER_CONTEXT: "true"
          REQUIRE_PROVISIONING_TOKEN: "false"
          ENABLE_READY_REDIS_CHECK: "false"
          PROVIDER_KEY_VAULT_KEK: final-release-provider-key-vault-kek-32-chars
          PROVIDER_KEY_VAULT_KEY_ID: final-release-local-kek-v1
        run: |
          mkdir -p .data
          python -m pytest \
            tests/test_final_backend_route_allowlist.py \
            tests/test_final_codebase_shape.py \
            tests/test_final_domain_outbox_worker.py \
            tests/test_final_product_smoke_contract.py \
            tests/test_final_domain_skeleton.py \
            tests/test_final_domain_tables.py \
            tests/test_final_intents_api.py::test_observe_only_workflow_runs_end_to_end_with_signed_evidence \
            tests/test_final_intents_api.py::test_final_approval_resolution_requires_role_and_binding_digest \
            tests/test_final_intents_api.py::test_final_approval_deny_blocks_bound_intent \
            tests/test_final_intents_api.py::test_stripe_refund_test_loop_verifies_real_sor_and_catches_false_success \
            tests/test_final_intents_api.py::test_incident_recovery_execution_queues_customer_executor \
            tests/test_final_intents_api.py::test_new_workflow_shape_publishes_without_backend_code_change \
            tests/test_owner_route_gate.py \
            tests/test_production_config.py \
            -q --tb=short
          python -m py_compile ../scripts/run_stripe_test_loop.py

  dashboard-final:
    name: Dashboard final gates
    runs-on: ubuntu-latest
    timeout-minutes: 45
    defaults:
      run:
        working-directory: zroky-dashboard

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: zroky-dashboard/package-lock.json

      - name: Install dashboard dependencies
        run: npm ci

      - name: Run dashboard unit gates
        run: |
          npm test -- --run \
            src/lib/dashboard-route-contract.test.ts \
            src/lib/route-auth-guard.test.ts \
            src/components/dashboard-shell.test.tsx \
            src/components/command-palette.test.tsx \
            "src/app/(dashboard)/home/page.test.tsx" \
            "src/app/(dashboard)/operations/page.test.tsx" \
            "src/app/(dashboard)/outcomes/page.test.tsx" \
            "src/app/(dashboard)/evidence/page.test.tsx"

      - name: Build dashboard
        env:
          ZROKY_API_BASE_URL: http://127.0.0.1:8010
          ZROKY_ALLOW_LOCAL_API_BASE_URL: "1"
        run: npm run build

  sdk-final:
    name: SDK final gates
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: zroky-sdk/pyproject.toml

      - name: Install Python SDK dependencies
        working-directory: zroky-sdk
        run: python -m pip install -e ".[dev]"

      - name: Run Python SDK final gates
        working-directory: zroky-sdk
        run: python -m pytest tests/test_final_sdk_shape.py tests/test_final_sdk_public_surface.py tests/test_final_pre_execution_guard.py tests/test_runner.py -q

      - name: Set up Node 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: zroky-sdk-js/package-lock.json

      - name: Install JS SDK dependencies
        working-directory: zroky-sdk-js
        run: npm ci

      - name: Run JS SDK final gates
        working-directory: zroky-sdk-js
        run: npm test -- tests/public_surface.test.ts tests/intent.test.ts tests/guard.test.ts tests/verified_action.test.ts tests/verify.test.ts

      - name: Build JS SDK package
        working-directory: zroky-sdk-js
        run: npm run build

  production-smoke:
    name: Optional deployed production smoke
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.production_api_url != '' && inputs.production_dashboard_url != '' }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run deployed smoke
        run: |
          python scripts/run_final_product_smoke.py \
            --api-base-url "${{ inputs.production_api_url }}" \
            --dashboard-base-url "${{ inputs.production_dashboard_url }}"

  release-decision:
    name: Release decision
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs:
      - tracker
      - backend-final
      - dashboard-final
      - sdk-final
      - production-smoke
    if: ${{ always() }}

    steps:
      - name: Require final gates
        env:
          NEEDS_JSON: ${{ toJson(needs) }}
        run: |
          python - <<'PY'
          import json
          import os
          import sys

          needs = json.loads(os.environ["NEEDS_JSON"])
          allowed_skips = {"production-smoke"}
          failures = {
              name: metadata.get("result")
              for name, metadata in needs.items()
              if metadata.get("result") != "success"
              and not (name in allowed_skips and metadata.get("result") == "skipped")
          }
          if failures:
              for name, result in sorted(failures.items()):
                  print(f"{name}: {result}")
              sys.exit(1)
          print("Final production release gates passed.")
          PY
