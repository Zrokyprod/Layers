groups:
  - name: zroky_slo_burn_rates
    interval: 60s
    rules:

      # ── zroky-backend ────────────────────────────────────────────────────────
      - alert: BackendSLOBurn1h
        expr: |
          (
            sum(rate(http_requests_total{job="zroky-backend",status=~"5.."}[1h]))
            /
            sum(rate(http_requests_total{job="zroky-backend"}[1h]))
          ) > 0.02
        for: 2m
        labels:
          service: zroky-backend
          severity: page
        annotations:
          summary: "zroky-backend: >2% error budget burned in 1h"
          description: "Error rate {{ $value | humanizePercentage }} in last 1h. SLO window: 99.5% success. 2% budget in 1h = page."
          runbook_url: "https://docs.zroky.dev/runbooks/backend-slo-burn"

      - alert: BackendSLOBurn6h
        expr: |
          (
            sum(rate(http_requests_total{job="zroky-backend",status=~"5.."}[6h]))
            /
            sum(rate(http_requests_total{job="zroky-backend"}[6h]))
          ) > 0.05
        for: 5m
        labels:
          service: zroky-backend
          severity: page
        annotations:
          summary: "zroky-backend: >5% error budget burned in 6h"
          description: "Error rate {{ $value | humanizePercentage }} in last 6h."
          runbook_url: "https://docs.zroky.dev/runbooks/backend-slo-burn"

      - alert: BackendSLOBurn24h
        expr: |
          (
            sum(rate(http_requests_total{job="zroky-backend",status=~"5.."}[24h]))
            /
            sum(rate(http_requests_total{job="zroky-backend"}[24h]))
          ) > 0.10
        for: 10m
        labels:
          service: zroky-backend
          severity: ticket
        annotations:
          summary: "zroky-backend: >10% error budget burned in 24h"
          description: "Error rate {{ $value | humanizePercentage }} in last 24h."
          runbook_url: "https://docs.zroky.dev/runbooks/backend-slo-burn"

