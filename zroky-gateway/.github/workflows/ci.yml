name: CI

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  test:
    name: vet + test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache: true

      - name: License header check (CI rule 16)
        run: |
          missing=$(grep -rL "SPDX-License-Identifier: FSL-1.1-MIT" internal/ cmd/ --include="*.go" 2>/dev/null || true)
          if [ -n "$missing" ]; then
            echo "Missing SPDX header in:"; echo "$missing"; exit 1
          fi

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test -race -count=1 ./...

      - name: Build
        run: go build -o /dev/null ./cmd/gateway

  lint:
    name: golangci-lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache: true

      - uses: golangci/golangci-lint-action@v6
        with:
          version: v1.59
