name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install
        run: python -m pip install -e ".[dev]"
      - name: Test
        run: python -m pytest -q tests
      - name: Compile public modules
        run: python -m py_compile zroky/__init__.py zroky/_call.py zroky/_async.py zroky/_telemetry.py zroky/preflight.py
