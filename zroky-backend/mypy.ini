[mypy]
python_version = 3.11
files = app
ignore_missing_imports = True
follow_imports = silent
pretty = True
strict_optional = False
allow_untyped_defs = True
allow_untyped_calls = True
warn_return_any = False
check_untyped_defs = False
# The backend still has legacy split modules that export route/model names through
# wildcard imports. Keep the release gate focused on importability and syntax until
# those modules are flattened and typed directly.
disable_error_code = attr-defined,name-defined,arg-type,union-attr,return-value,no-redef,override,call-overload
